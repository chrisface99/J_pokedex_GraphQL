<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${#strings.capitalize(pokemon.name) + ' — Pokédex'}">Pokémon — Pokédex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --red: #E3350D;
            --yellow: #FFD700;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
            --card-bg: #16213e;
            --card-border: #0f3460;
            --text: #e8eaf6;
            --text-muted: #7986cb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--darker);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
        }

        /* Type colors */
        .type-normal { background: #A8A878; color: #fff; }
        .type-fire { background: #F08030; color: #fff; }
        .type-water { background: #6890F0; color: #fff; }
        .type-electric { background: #F8D030; color: #444; }
        .type-grass { background: #78C850; color: #fff; }
        .type-ice { background: #98D8D8; color: #444; }
        .type-fighting { background: #C03028; color: #fff; }
        .type-poison { background: #A040A0; color: #fff; }
        .type-ground { background: #E0C068; color: #444; }
        .type-flying { background: #A890F0; color: #fff; }
        .type-psychic { background: #F85888; color: #fff; }
        .type-bug { background: #A8B820; color: #fff; }
        .type-rock { background: #B8A038; color: #fff; }
        .type-ghost { background: #705898; color: #fff; }
        .type-dragon { background: #7038F8; color: #fff; }
        .type-dark { background: #705848; color: #fff; }
        .type-steel { background: #B8B8D0; color: #444; }
        .type-fairy { background: #EE99AC; color: #fff; }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--red);
            box-shadow: 0 4px 30px rgba(227, 53, 13, 0.3);
        }

        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            height: 65px;
        }

        .back-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: var(--red);
            border-color: var(--red);
            transform: translateX(-4px);
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: var(--yellow);
            text-shadow: 0 0 20px rgba(255,215,0,0.5), 2px 2px 0 var(--red);
            text-decoration: none;
        }

        .logo span { color: var(--red); }

        /* Hero section */
        .hero {
            position: relative;
            overflow: hidden;
            padding: 60px 24px 40px;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .hero-pokeball {
            position: absolute;
            right: -100px;
            top: -100px;
            width: 500px;
            height: 500px;
            opacity: 0.04;
            border-radius: 50%;
            border: 80px solid white;
        }

        .hero-pokeball::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -80px;
            right: -80px;
            height: 80px;
            background: rgba(255,255,255,0.5);
            transform: translateY(-50%);
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
        }

        .pokemon-showcase {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .pokemon-main-img {
            width: 280px;
            height: 280px;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .sprite-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .sprite-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .sprite-item:hover { transform: scale(1.15); }

        .sprite-item img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        .sprite-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Info panel */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .pokemon-id {
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .pokemon-name-big {
            font-size: 52px;
            font-weight: 900;
            text-transform: capitalize;
            line-height: 1;
            letter-spacing: -1px;
        }

        .type-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .type-badge-lg {
            font-size: 13px;
            font-weight: 800;
            padding: 6px 18px;
            border-radius: 20px;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .basic-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: var(--yellow);
            display: block;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Detail cards section */
        .details-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .detail-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 28px;
        }

        .detail-card.full-width { grid-column: 1 / -1; }

        .card-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: var(--yellow);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Base stats */
        .stat-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .stat-name {
            font-size: 12px;
            font-weight: 800;
            text-transform: capitalize;
            color: var(--text-muted);
            width: 120px;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        .stat-num {
            font-size: 14px;
            font-weight: 900;
            width: 36px;
            flex-shrink: 0;
            text-align: right;
        }

        .stat-bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
            animation: growBar 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            width: 0;
        }

        @keyframes growBar {
            from { width: 0; }
        }

        .stat-bar-fill.low { background: linear-gradient(90deg, #E3350D, #ff6b47); }
        .stat-bar-fill.mid { background: linear-gradient(90deg, #F8D030, #FFE566); }
        .stat-bar-fill.high { background: linear-gradient(90deg, #78C850, #a8e878); }
        .stat-bar-fill.max { background: linear-gradient(90deg, #6890F0, #a0c0ff); }

        /* Abilities */
        .ability-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ability-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ability-name {
            font-size: 14px;
            font-weight: 800;
            text-transform: capitalize;
        }

        .hidden-tag {
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            background: rgba(120,56,248,0.3);
            border: 1px solid rgba(120,56,248,0.5);
            color: #a890f0;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Navigation */
        .nav-btns {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px 20px;
        }

        .nav-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: var(--red);
            border-color: var(--red);
            transform: scale(1.04);
            box-shadow: 0 8px 20px rgba(227,53,13,0.3);
        }

        .nav-btn .mini-sprite {
            width: 40px;
            height: 40px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        @media (max-width: 768px) {
            .hero-inner {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .type-badges { justify-content: center; }
            .basic-stats { grid-template-columns: 1fr 1fr 1fr; }
            .details-section { grid-template-columns: 1fr; }
            .detail-card.full-width { grid-column: 1; }
            .pokemon-name-big { font-size: 38px; }
            .pokemon-main-img { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="back-btn">← Back</a>
        <a href="/" class="logo">POKÉ<span>DEX</span></a>
    </div>
</header>

<!-- Hero -->
<div class="hero" th:with="bgType=${pokemon.primaryType}">
    <div class="hero-bg">
        <div class="hero-pokeball"></div>
        <!-- Type-based gradient background -->
        <div th:style="'position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%, ' + 
            (${bgType == 'fire'} ? 'rgba(240,128,48,0.15)' : 
             ${bgType == 'water'} ? 'rgba(104,144,240,0.15)' :
             ${bgType == 'grass'} ? 'rgba(120,200,80,0.15)' :
             ${bgType == 'electric'} ? 'rgba(248,208,48,0.15)' :
             ${bgType == 'psychic'} ? 'rgba(248,88,136,0.15)' :
             ${bgType == 'dragon'} ? 'rgba(112,56,248,0.15)' :
             ${bgType == 'ghost'} ? 'rgba(112,88,152,0.15)' :
             ${bgType == 'ice'} ? 'rgba(152,216,216,0.15)' :
             'rgba(168,168,120,0.10)') + 
            ', transparent 70%)'">
        </div>
    </div>

    <div class="hero-inner">
        <div class="pokemon-showcase">
            <img class="pokemon-main-img"
                 th:src="${pokemon.officialArtworkUrl}"
                 th:alt="${pokemon.name}"
                 id="mainImg"
                 onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + [[${pokemon.id}]] + '.png'"/>

            <div class="sprite-row">
                <div class="sprite-item" th:if="${pokemon.sprites.frontDefault}" onclick="setMain(this)">
                    <img th:src="${pokemon.sprites.frontDefault}" th:alt="'Front ' + ${pokemon.name}"/>
                    <div class="sprite-label">Front</div>
                </div>
                <div class="sprite-item" th:if="${pokemon.sprites.backDefault}" onclick="setMain(this)">
                    <img th:src="${pokemon.sprites.backDefault}" th:alt="'Back ' + ${pokemon.name}"/>
                    <div class="sprite-label">Back</div>
                </div>
                <div class="sprite-item" th:if="${pokemon.sprites.frontShiny}" onclick="setMain(this)">
                    <img th:src="${pokemon.sprites.frontShiny}" th:alt="'Shiny ' + ${pokemon.name}"/>
                    <div class="sprite-label">✨ Shiny</div>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <div class="pokemon-id" th:text="'#' + ${#strings.toString(pokemon.id).length() < 3 ? (#strings.toString(pokemon.id).length() == 1 ? '00' + pokemon.id : '0' + pokemon.id) : pokemon.id}"></div>
            <div class="pokemon-name-big" th:text="${pokemon.name}"></div>

            <div class="type-badges">
                <span th:each="typeSlot : ${pokemon.types}"
                      th:text="${typeSlot.type.name}"
                      th:classappend="'type-badge-lg type-' + ${typeSlot.type.name}">
                </span>
            </div>

            <div class="basic-stats">
                <div class="stat-box">
                    <span class="stat-value" th:text="${pokemon.height / 10.0} + 'm'"></span>
                    <span class="stat-label">Height</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" th:text="${pokemon.weight / 10.0} + 'kg'"></span>
                    <span class="stat-label">Weight</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" th:text="${pokemon.baseExperience}"></span>
                    <span class="stat-label">Base XP</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nav prev/next -->
<div class="nav-btns">
    <a th:if="${prevId != null}" th:href="@{/pokemon/{id}(id=${prevId})}" class="nav-btn">
        <img th:src="'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + ${prevId} + '.png'"
             class="mini-sprite" alt="prev"/>
        ← #<span th:text="${prevId}"></span>
    </a>
    <div th:if="${prevId == null}"></div>
    <a th:href="@{/pokemon/{id}(id=${nextId})}" class="nav-btn">
        #<span th:text="${nextId}"></span> →
        <img th:src="'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + ${nextId} + '.png'"
             class="mini-sprite" alt="next"/>
    </a>
</div>

<!-- Details -->
<div class="details-section">
    <!-- Base Stats -->
    <div class="detail-card full-width">
        <div class="card-title">Base Stats</div>
        <div th:each="statSlot : ${pokemon.stats}">
            <div class="stat-row">
                <span class="stat-name" th:text="${statSlot.stat.name.replace('-', ' ')}"></span>
                <span class="stat-num" th:text="${statSlot.baseStat}"></span>
                <div class="stat-bar-track">
                    <div class="stat-bar-fill"
                         th:classappend="${statSlot.baseStat < 45} ? 'low' : (${statSlot.baseStat < 80} ? 'mid' : (${statSlot.baseStat < 120} ? 'high' : 'max'))"
                         th:style="'width:' + ${T(Math).min(100, statSlot.baseStat / 255.0 * 100)} + '%'">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Abilities -->
    <div class="detail-card">
        <div class="card-title">Abilities</div>
        <div class="ability-list">
            <div th:each="abilitySlot : ${pokemon.abilities}" class="ability-item">
                <span class="ability-name" th:text="${abilitySlot.ability.name.replace('-', ' ')}"></span>
                <span th:if="${abilitySlot.hidden}" class="hidden-tag">Hidden</span>
            </div>
        </div>
    </div>

    <!-- Info -->
    <div class="detail-card">
        <div class="card-title">Information</div>
        <div style="display: flex; flex-direction: column; gap: 14px;">
            <div class="stat-row" style="margin: 0;">
                <span class="stat-name">Pokédex #</span>
                <span style="font-weight: 800;" th:text="${pokemon.id}"></span>
            </div>
            <div class="stat-row" style="margin: 0;">
                <span class="stat-name">Name</span>
                <span style="font-weight: 800; text-transform: capitalize;" th:text="${pokemon.name}"></span>
            </div>
            <div class="stat-row" style="margin: 0;">
                <span class="stat-name">Height</span>
                <span style="font-weight: 800;" th:text="${pokemon.height / 10.0} + ' m (' + ${(int)(pokemon.height * 0.328)} + '\'' + ${(int)((pokemon.height * 3.28084 % 1) * 12)} + '&quot;)'"></span>
            </div>
            <div class="stat-row" style="margin: 0;">
                <span class="stat-name">Weight</span>
                <span style="font-weight: 800;" th:text="${pokemon.weight / 10.0} + ' kg (' + ${#numbers.formatDecimal(pokemon.weight * 0.220462 / 10, 1, 1)} + ' lbs)'"></span>
            </div>
            <div class="stat-row" style="margin: 0;">
                <span class="stat-name">Base EXP</span>
                <span style="font-weight: 800;" th:text="${pokemon.baseExperience}"></span>
            </div>
        </div>
    </div>
</div>

<script>
    function setMain(el) {
        const img = el.querySelector('img');
        if (img) {
            document.getElementById('mainImg').src = img.src;
        }
    }
</script>

</body>
</html>
